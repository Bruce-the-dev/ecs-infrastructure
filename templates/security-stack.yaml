AWSTemplateFormatVersion: '2010-09-09'
Description: Security groups and VPC endpoints for the ecs-cicd lab

Parameters:
  ProjectName:
    Type: String
    Default: ecs-cicd

  VpcId:
    Type: String
    Description: VPC ID (passed from parent stack)

  PrivateSubnet1:
    Type: String
    Description: Private subnet ID in AZ1 (passed from parent stack)

  PrivateSubnet2:
    Type: String
    Description: Private subnet ID in AZ2 (passed from parent stack)

  PrivateRouteTable1:
    Type: String
    Description: Private route table ID for AZ1 (passed from parent stack)

  PrivateRouteTable2:
    Type: String
    Description: Private route table ID for AZ2 (passed from parent stack)

  ContainerPort:
    Type: Number
    Default: 8080
    Description: The port the container listens on

Resources:

  AlbSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: !Sub '${ProjectName}-alb-sg'
      GroupDescription: Allow HTTP traffic from the internet to the ALB
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
          Description: HTTP from anywhere
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-alb-sg'
        - Key: Project
          Value: !Ref ProjectName

  EcsTaskSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: !Sub '${ProjectName}-ecs-task-sg'
      GroupDescription: Allow traffic from ALB only
      VpcId: !Ref VpcId
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-ecs-task-sg'
        - Key: Project
          Value: !Ref ProjectName

  EcsTaskIngressFromAlb:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref EcsTaskSecurityGroup
      IpProtocol: tcp
      FromPort: !Ref ContainerPort
      ToPort: !Ref ContainerPort
      SourceSecurityGroupId: !Ref AlbSecurityGroup
      Description: !Sub 'Container port ${ContainerPort} from ALB only'

  VpcEndpointSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: !Sub '${ProjectName}-vpce-sg'
      GroupDescription: Allow HTTPS from ECS tasks to VPC endpoints
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          SourceSecurityGroupId: !Ref EcsTaskSecurityGroup
          Description: HTTPS from ECS tasks
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-vpce-sg'
        - Key: Project
          Value: !Ref ProjectName

  EcrApiEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref VpcId
      ServiceName: !Sub 'com.amazonaws.${AWS::Region}.ecr.api'
      VpcEndpointType: Interface
      PrivateDnsEnabled: true
      SubnetIds:
        - !Ref PrivateSubnet1
        - !Ref PrivateSubnet2
      SecurityGroupIds:
        - !Ref VpcEndpointSecurityGroup

  EcrDkrEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref VpcId
      ServiceName: !Sub 'com.amazonaws.${AWS::Region}.ecr.dkr'
      VpcEndpointType: Interface
      PrivateDnsEnabled: true
      SubnetIds:
        - !Ref PrivateSubnet1
        - !Ref PrivateSubnet2
      SecurityGroupIds:
        - !Ref VpcEndpointSecurityGroup

  LogsEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref VpcId
      ServiceName: !Sub 'com.amazonaws.${AWS::Region}.logs'
      VpcEndpointType: Interface
      PrivateDnsEnabled: true
      SubnetIds:
        - !Ref PrivateSubnet1
        - !Ref PrivateSubnet2
      SecurityGroupIds:
        - !Ref VpcEndpointSecurityGroup

  S3GatewayEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref VpcId
      ServiceName: !Sub 'com.amazonaws.${AWS::Region}.s3'
      VpcEndpointType: Gateway
      RouteTableIds:
        - !Ref PrivateRouteTable1
        - !Ref PrivateRouteTable2

Outputs:
  AlbSecurityGroupId:
    Description: Security group for the ALB
    Value: !Ref AlbSecurityGroup

  EcsTaskSecurityGroupId:
    Description: Security group for ECS tasks
    Value: !Ref EcsTaskSecurityGroup

  VpcEndpointSecurityGroupId:
    Description: Security group for VPC endpoints
    Value: !Ref VpcEndpointSecurityGroup