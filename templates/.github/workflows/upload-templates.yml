name: Upload CloudFormation Templates to S3

on:
  push:
    branches:
      - main
    paths:
      - 'templates/**'

permissions:
  id-token: write
  contents: read

jobs:
  upload-templates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Upload templates to S3
        run: |
          aws s3 sync templates/ s3://${{ vars.TEMPLATES_BUCKET }}/templates/ \
            --delete \
            --exact-timestamps

      - name: Output bucket info
        run: |
          echo "✅ Templates uploaded to: s3://${{ vars.TEMPLATES_BUCKET }}/templates/"
          aws s3 ls s3://${{ vars.TEMPLATES_BUCKET }}/templates/