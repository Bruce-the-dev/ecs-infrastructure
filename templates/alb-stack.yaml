AWSTemplateFormatVersion: '2010-09-09'
Description: Application Load Balancer with blue/green target groups for the ecs-cicd lab

Parameters:
  ProjectName:
    Type: String
    Default: ecs-cicd

  VpcId:
    Type: String
    Description: VPC ID (passed from parent stack)

  PublicSubnet1:
    Type: String
    Description: Public subnet ID in AZ1 (passed from parent stack)

  PublicSubnet2:
    Type: String
    Description: Public subnet ID in AZ2 (passed from parent stack)

  AlbSecurityGroup:
    Type: String
    Description: Security group ID for the ALB (passed from parent stack)

  ContainerPort:
    Type: Number
    Default: 8080
    Description: The port the container listens on

  HealthCheckPath:
    Type: String
    Default: /hello
    Description: Path the ALB will use for health checks against ECS tasks

Resources:

  ApplicationLoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub '${ProjectName}-alb'
      Scheme: internet-facing
      Type: application
      IpAddressType: ipv4
      Subnets:
        - !Ref PublicSubnet1
        - !Ref PublicSubnet2
      SecurityGroups:
        - !Ref AlbSecurityGroup
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-alb'
        - Key: Project
          Value: !Ref ProjectName

  BlueTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub '${ProjectName}-tg-blue'
      VpcId: !Ref VpcId
      Port: !Ref ContainerPort
      Protocol: HTTP
      TargetType: ip
      HealthCheckPath: !Ref HealthCheckPath
      HealthCheckProtocol: HTTP
      HealthCheckPort: traffic-port
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 5
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3
      Matcher:
        HttpCode: '200'
      TargetGroupAttributes:
        - Key: deregistration_delay.timeout_seconds
          Value: '30'
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-tg-blue'
        - Key: Color
          Value: blue

  GreenTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub '${ProjectName}-tg-green'
      VpcId: !Ref VpcId
      Port: !Ref ContainerPort
      Protocol: HTTP
      TargetType: ip
      HealthCheckPath: !Ref HealthCheckPath
      HealthCheckProtocol: HTTP
      HealthCheckPort: traffic-port
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 5
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3
      Matcher:
        HttpCode: '200'
      TargetGroupAttributes:
        - Key: deregistration_delay.timeout_seconds
          Value: '30'
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-tg-green'
        - Key: Color
          Value: green

  HttpListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ApplicationLoadBalancer
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref BlueTargetGroup

Outputs:
  AlbDnsName:
    Description: Public DNS name of the ALB
    Value: !GetAtt ApplicationLoadBalancer.DNSName

  AlbArn:
    Description: ARN of the ALB
    Value: !Ref ApplicationLoadBalancer

  HttpListenerArn:
    Description: ARN of the HTTP listener
    Value: !Ref HttpListener

  BlueTargetGroupArn:
    Description: ARN of the blue target group
    Value: !Ref BlueTargetGroup

  GreenTargetGroupArn:
    Description: ARN of the green target group
    Value: !Ref GreenTargetGroup

  BlueTargetGroupName:
    Description: Name of the blue target group
    Value: !GetAtt BlueTargetGroup.TargetGroupName

  GreenTargetGroupName:
    Description: Name of the green target group
    Value: !GetAtt GreenTargetGroup.TargetGroupName