AWSTemplateFormatVersion: '2010-09-09'
Description: CodeDeploy application and deployment group for ECS blue/green deployments

Parameters:
  ProjectName:
    Type: String
    Default: ecs-cicd
  ClusterName:
    Type: String
    Description: Name of the ECS cluster (passed from parent stack)

  ServiceName:
    Type: String
    Description: Name of the ECS service (passed from parent stack)

  BlueTargetGroupName:
    Type: String
    Description: Name of the blue target group (passed from parent stack)

  GreenTargetGroupName:
    Type: String
    Description: Name of the green target group (passed from parent stack)

  HttpListenerArn:
    Type: String
    Description: ARN of the ALB HTTP listener (passed from parent stack)
    
Resources:

  CodeDeployServiceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${ProjectName}-codedeploy-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: codedeploy.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AWSCodeDeployRoleForECS
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  CodeDeployApplication:
    Type: AWS::CodeDeploy::Application
    Properties:
      ApplicationName: !Sub '${ProjectName}-codedeploy-app'
      ComputePlatform: ECS

  CodeDeployDeploymentGroup:
    Type: AWS::CodeDeploy::DeploymentGroup
    DependsOn: 
      - CodeDeployServiceRole
      - CodeDeployApplication  
    Properties:
      ApplicationName: !Ref CodeDeployApplication
      DeploymentGroupName: !Sub '${ProjectName}-deployment-group'
      ServiceRoleArn: !GetAtt CodeDeployServiceRole.Arn
      DeploymentConfigName: CodeDeployDefault.ECSAllAtOnce
      DeploymentStyle:
        DeploymentType: BLUE_GREEN
        DeploymentOption: WITH_TRAFFIC_CONTROL
      AutoRollbackConfiguration:
        Enabled: true
        Events:
          - DEPLOYMENT_FAILURE
          - DEPLOYMENT_STOP_ON_ALARM
          - DEPLOYMENT_STOP_ON_REQUEST
      BlueGreenDeploymentConfiguration:
        TerminateBlueInstancesOnDeploymentSuccess:
          Action: TERMINATE
          TerminationWaitTimeInMinutes: 5
        DeploymentReadyOption:
          ActionOnTimeout: CONTINUE_DEPLOYMENT
      ECSServices:
        - ClusterName: !Ref ClusterName
          ServiceName: !Ref ServiceName
      LoadBalancerInfo:
        TargetGroupPairInfoList:
          - TargetGroups:
              - Name: !Ref BlueTargetGroupName
              - Name: !Ref GreenTargetGroupName
            ProdTrafficRoute:
              ListenerArns:
                - !Ref HttpListenerArn

Outputs:
  CodeDeployApplicationName:
    Description: Name of the CodeDeploy application
    Value: !Ref CodeDeployApplication
   
  CodeDeployDeploymentGroupName:
    Description: Name of the deployment group
    Value: !Ref CodeDeployDeploymentGroup
   
  CodeDeployServiceRoleArn:
    Description: ARN of the CodeDeploy service role
    Value: !GetAtt CodeDeployServiceRole.Arn
   