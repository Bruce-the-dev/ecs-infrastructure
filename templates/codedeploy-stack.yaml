AWSTemplateFormatVersion: '2010-09-09'
Description: CodeDeploy application and deployment group for ECS blue/green deployments

Parameters:
  ProjectName:
    Type: String
    Default: ecs-cicd

Resources:

  CodeDeployServiceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${ProjectName}-codedeploy-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: codedeploy.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AWSCodeDeployRoleForECS
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  CodeDeployApplication:
    Type: AWS::CodeDeploy::Application
    Properties:
      ApplicationName: !Sub '${ProjectName}-codedeploy-app'
      ComputePlatform: ECS

  CodeDeployDeploymentGroup:
    Type: AWS::CodeDeploy::DeploymentGroup
    Properties:
      ApplicationName: !Ref CodeDeployApplication
      DeploymentGroupName: !Sub '${ProjectName}-deployment-group'
      ServiceRoleArn: !GetAtt CodeDeployServiceRole.Arn
      DeploymentConfigName: CodeDeployDefault.ECSAllAtOnce
      DeploymentStyle:
        DeploymentType: BLUE_GREEN
        DeploymentOption: WITH_TRAFFIC_CONTROL
      AutoRollbackConfiguration:
        Enabled: true
        Events:
          - DEPLOYMENT_FAILURE
          - DEPLOYMENT_STOP_ON_ALARM
          - DEPLOYMENT_STOP_ON_REQUEST
      BlueGreenDeploymentConfiguration:
        TerminateBlueInstancesOnDeploymentSuccess:
          Action: TERMINATE
          TerminationWaitTimeInMinutes: 5
        DeploymentReadyOption:
          ActionOnTimeout: CONTINUE_DEPLOYMENT
      ECSServices:
        - ClusterName: !ImportValue ecs-infrastructure-ecs-ClusterName
          ServiceName: !ImportValue ecs-infrastructure-ecs-ServiceName
      LoadBalancerInfo:
        TargetGroupPairInfoList:
          - TargetGroups:
              - Name: !ImportValue ecs-infrastructure-alb-BlueTargetGroupName
              - Name: !ImportValue ecs-infrastructure-alb-GreenTargetGroupName
            ProdTrafficRoute:
              ListenerArns:
                - !ImportValue ecs-infrastructure-alb-HttpListenerArn

Outputs:
  CodeDeployApplicationName:
    Description: Name of the CodeDeploy application
    Value: !Ref CodeDeployApplication
    Export:
      Name: !Sub '${AWS::StackName}-ApplicationName'

  CodeDeployDeploymentGroupName:
    Description: Name of the deployment group
    Value: !Ref CodeDeployDeploymentGroup
    Export:
      Name: !Sub '${AWS::StackName}-DeploymentGroupName'

  CodeDeployServiceRoleArn:
    Description: ARN of the CodeDeploy service role
    Value: !GetAtt CodeDeployServiceRole.Arn
    Export:
      Name: !Sub '${AWS::StackName}-ServiceRoleArn'